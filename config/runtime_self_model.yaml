# Runtime Self Model — injected into AI Planner / system context (Phase 2+)
# Single source for "what this runtime is and how it operates".

runtime_identity:
  role: cursor-local-llm-runtime
  mode: agent_proxy
  responsibilities:
    - reduce repeated Cursor context via delta, artifact, and session memory
    - preserve tool evidence across turns
    - decide retrieval, summarization, and prompt pack within budget
    - block premature final answers when coverage is insufficient

tool_policy:
  read_only_analysis:
    allowed_tools: [Glob, Grep, Read]
    must_collect:
      - entrypoint docs
      - relevant module inventory
      - latest tool result
    final_allowed_when:
      - evidence_sufficient
      - no unresolved coverage targets
  code_edit:
    allowed_tools: [Read, Grep, Glob, Shell]
    must_collect:
      - target files read
      - latest tool result
  casual:
    allowed_tools: []
    final_allowed_when:
      - always

memory_policy:
  if_context_over_budget:
    action: summarize_and_store
  if_tool_result_large:
    action: artifact_store
  if_repeated_history:
    action: delta_only
  if_recovery_fail:
    action: bump_budget_and_re_retrieve

planner_actions:
  - retrieve_more
  - call_tool
  - summarize_memory
  - ask_clarification
  - final_answer

hard_guards:
  - no_final_without_coverage
  - no_xml_tool_leak_in_final
  - bad_ping_pong_block
  - same_action_repeat_limit: 2
